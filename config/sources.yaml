# config/sources.yaml — the saved, version-controlled PDAC query + per-source
# params. This is the SINGLE SOURCE OF TRUTH for coverage. Keep the query stable
# so week-over-week harvests are reproducible; change the focus areas in
# interest_profile.yaml instead of widening this query unless coverage demands it.

# Trailing window (days) the harvester pulls on each run. "New" is ultimately
# defined by first_seen_date at ingestion (see normalize.py); this only bounds
# what each source returns per run.
window_days: 7

# Contact details for API etiquette (NCBI/EBI ask for a tool name + email).
contact_email: a.voigt1121@gmail.com
tool_name: bcc-lit-agent

# --- Europe PMC REST — PRIMARY ------------------------------------------------
# All PubMed + OA full-text flags + text-mined annotations. resultType=core
# returns abstracts, authors, MeSH, and OA flags in one call.
europepmc:
  enabled: true
  base_url: https://www.ebi.ac.uk/europepmc/webservices/rest/search
  query: >-
    (pancreatic ductal adenocarcinoma OR PDAC OR "pancreatic cancer"
     OR "pancreatic neoplasms" OR "pancreatic carcinoma")
  date_field: FIRST_PDATE   # FIRST_PDATE (first publication) | CREATION_DATE
  page_size: 1000           # Europe PMC max
  result_type: core         # core => abstract, authors, MeSH, OA flags
  max_pages: 10             # safety cap for the spike

# --- PubMed E-utilities — secondary / MeSH ------------------------------------
# Authoritative MeSH terms. Throttled to requests_per_second (3 anon; set the
# NCBI_API_KEY env var to lift to 10).
pubmed:
  enabled: true
  esearch_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
  efetch_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi
  term: >-
    (pancreatic ductal adenocarcinoma[Title/Abstract] OR PDAC[Title/Abstract]
     OR "pancreatic neoplasms"[MeSH Terms] OR pancreatic cancer[Title/Abstract])
  date_type: pdat           # pdat = publication date; edat = Entrez (indexed) date
  retmax: 2000
  efetch_batch: 200
  requests_per_second: 3

# --- bioRxiv / medRxiv — preprints, REQUIRED for recency ----------------------
# The details endpoint has no text search, so it returns every preprint in the
# window; we keep only those matching `keywords` (substring over title+abstract).
preprints:
  enabled: true
  servers: [biorxiv, medrxiv]
  # Both servers are served from the api.biorxiv.org host; {server} selects which.
  base_url_tmpl: https://api.biorxiv.org/details/{server}/{date_from}/{date_to}/{cursor}
  page_size: 100            # API returns 100 per page
  max_pages: 50             # safety cap
  keywords:
    - pancreatic ductal adenocarcinoma
    - pdac
    - pancreatic cancer
    - pancreatic tumor
    - pancreatic tumour
    - pancreatic neoplasm
    - pancreatic carcinoma

# --- OpenAlex — coverage cross-check + citation backstop (NOT a harvest source) -
# Used by scripts/coverage_check.py to triangulate the Europe PMC query (feeds the
# provenance block below) and reused by Phase D for the "N papers cite your work"
# signal (pipeline/openalex.py). NOT a literature feed — the offline harvest never
# pulls from it. Polite pool: the top-level contact_email is sent as `mailto`.
# All keys are optional; the values shown are the code defaults.
openalex:
  # search:  (optional) OpenAlex search expression to use INSTEAD of the one
  #          derived from europepmc.query. Unset = derive it (outer parens
  #          stripped) so both sides run the same query.
  search_field: title_and_abstract   # .search field. NOT default.search — that also
                                     #   matches full text and massively over-counts.
  types: article|review|preprint     # primary-literature types comparable to MEDLINE
                                     #   (excludes book chapters, datasets, peer reviews);
                                     #   set to 'all' to disable the type filter.
  date_field: publication_date       # OpenAlex date filter (the EPMC side uses FIRST_PDATE).

# >>> provenance: measured coverage — auto-written by scripts/coverage_check.py >>>
# Do NOT hand-edit; re-run `python scripts/coverage_check.py` to refresh.
# measured_recall is THIS system's self-measured number — never hardcode the
# ~98% figure (a study of OpenAlex vs guideline-cited papers, not this query;
# see CAPABILITIES.md §3.5).
provenance:
  measured_recall: 0.7604
  denominator: fraction of the EPMC + OpenAlex DOI union returned by EPMC
  denominator_source: OpenAlex cross-check
  as_of: '2026-06-18'
  window:
    from: '2025-05-19'
    to: '2026-05-19'
  method:
    openalex_search_field: title_and_abstract
    openalex_types: article|review|preprint
    openalex_query: pancreatic ductal adenocarcinoma OR PDAC OR "pancreatic cancer"
      OR "pancreatic neoplasms" OR "pancreatic carcinoma"
  epmc_doi_count: 10594
  openalex_doi_count: 6483
  overlap: 3145
  union: 13932
  note: 'Self-measured by scripts/coverage_check.py over the window above. NOT the
    published ~98% OpenAlex/guideline figure (CAPABILITIES.md §3.5). Denominator =
    DOI union of EPMC and OpenAlex (types: article|review|preprint). Spot-checks show
    the EPMC-absent remainder is dominated by conference/meeting abstracts and repository
    deposits (Figshare/Zenodo) that OpenAlex types as ''article'' but MEDLINE/PMC
    does not index as primary literature; date-field semantics is a minor contributor.
    So this is a CONSERVATIVE lower bound on EPMC''s recall of peer-reviewed PDAC
    papers, not a 24% gap in research coverage. Re-run after any change to europepmc.query.'
