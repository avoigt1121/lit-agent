# config/interest_profile.yaml — the BCC interest model (consumed in Phase 2)
# + the coverage-trend count queries (Phase 4 analytics backfill).
#
# Real BCC/Sears-lab focus areas (set 2026-06-17). The harvest query stays BROAD
# (all PDAC, in sources.yaml); these areas are the layer on top that route papers
# into the digest + analytics + (post-v1) per-area Space tabs.
#
# Two query roles per area, kept separate on purpose:
#   keywords     — free-text terms embedded for the digest's classifier (loose;
#                  fine for embedding similarity).
#   count_query  — a SPECIFIC Europe PMC boolean query used ONLY for the coverage
#                  time-series (hitCount). Must be tight — generic terms like
#                  "resistance" would inflate counts. Tune freely; it never
#                  touches the digest classification.
#
# exemplar_dois are EMPTY for now — the highest-leverage classifier tuning input.

audience_note: >
  Brenden-Colson Center for Pancreatic Care (OHSU, Sears & Brody labs) —
  translational PDAC. Surface mechanism, therapeutic strategy, and clinically/
  translationally actionable findings; de-emphasize incidental case reports and
  non-pancreatic cancers.

# Classification + digest tuning (config, not code — change without redeploy).
classification:
  candidate_top_k: 2             # embedding candidates per paper handed to the LLM confirm
  max_areas_per_paper: 2         # final multi-label cap after confirm
  fallback_min_confidence: 0.68  # key-free mode ONLY: keep best area if >= this, else none
digest:
  top_n_per_area: 6

focus_areas:
  # id kept as `myc` for continuity with already-classified corpus rows + the
  # coverage_counts series; the AREA is now the broader "oncogenic drivers & gene
  # regulation" umbrella, with MYC (a Sears-lab signature) as one sub-topic.
  - id: myc
    name: Oncogenic drivers & gene regulation
    keywords: [MYC, c-MYC, MYC stability, MYC phosphorylation, S62, T58, FBXW7,
               PP2A, Omomyc, MYC degradation, MYC amplification, MYC targets, MAX,
               oncogene, transcription factor, transcriptional regulation,
               super-enhancer, chromatin, epigenetic regulation, gene expression,
               oncogenic signaling]
    count_query: '(MYC OR "c-MYC" OR MYCN OR Omomyc OR oncogene OR
                   "transcription factor" OR "transcriptional regulation" OR
                   super-enhancer)'
    exemplar_dois: []
    audience_note: >
      Oncogenic drivers and gene-expression control in PDAC — oncogenes and
      transcription factors (MYC stability/phosphorylation is a Sears-lab
      signature), transcriptional/epigenetic programs, and strategies that target
      them.

  # id kept as `hur_elavl1` for corpus + coverage continuity; the AREA is now the
  # broader "RNA-binding proteins & mRNA regulation" umbrella, with HuR/ELAVL1 (a
  # Brody-lab focus) as one sub-topic.
  - id: hur_elavl1
    name: RNA-binding proteins & mRNA regulation
    keywords: [HuR, ELAVL1, RNA-binding protein, RBP, mRNA stability, AU-rich element,
               ARE, post-transcriptional regulation, ribonucleoprotein, RNA stability,
               splicing, alternative splicing, translation control, m6A, RNA metabolism]
    count_query: '("RNA-binding protein" OR HuR OR ELAVL1 OR "mRNA stability" OR
                   "post-transcriptional" OR splicing OR m6A)'
    exemplar_dois: []
    audience_note: >
      RNA-binding proteins and post-transcriptional control in PDAC — HuR/ELAVL1
      (a Brody-lab focus) and other RBPs, mRNA stability / AU-rich-element biology,
      splicing and translation, and RBP-directed therapeutic strategies.

  - id: kras_ras_mapk
    name: KRAS / RAS–MAPK & RAS-targeted therapy
    keywords: [KRAS, G12D, G12C, G12V, pan-RAS, RAS, MAPK, MEK, ERK, SHP2, SOS1,
               RAF, sotorasib, adagrasib, MRTX1133, RMC-6236, RAS(ON), feedback, resistance]
    count_query: '(KRAS OR G12D OR G12C OR "pan-RAS" OR SHP2 OR SOS1 OR sotorasib
                   OR adagrasib OR MRTX1133 OR MEK OR ERK)'
    exemplar_dois: []
    audience_note: >
      KRAS-mutant PDAC mechanism, RAS-targeted inhibitors (G12D/G12C/pan-RAS),
      MAPK-pathway signaling, and resistance/combination strategies.

  - id: ddr_repair
    name: DNA damage response & repair
    keywords: [DNA damage response, DNA repair, BRCA1, BRCA2, PALB2, homologous
               recombination, HRD, PARP, PARP inhibitor, olaparib, PARG, replication
               stress, ATR, CHK1, WEE1, platinum, synthetic lethality]
    count_query: '(BRCA1 OR BRCA2 OR PALB2 OR "homologous recombination" OR HRD OR
                   PARP OR olaparib OR PARG OR "replication stress" OR ATR OR CHK1
                   OR WEE1 OR "DNA damage response" OR "DNA repair")'
    exemplar_dois: []
    audience_note: >
      DDR/repair vulnerabilities — BRCA/PALB2/HRD, PARP/PARG inhibition,
      replication-stress targets (ATR/CHK1/WEE1), and platinum/synthetic-lethal strategies.

  - id: immunology_immunotherapy
    name: Tumor immunology & immunotherapy
    keywords: [immune evasion, T cell, checkpoint, PD-1, PD-L1, CTLA-4, CAR-T,
               vaccine, neoantigen, myeloid, macrophage, MDSC, Treg, immunotherapy,
               cytokine, antigen presentation]
    count_query: '(immunotherapy OR "immune evasion" OR "T cell" OR checkpoint OR
                   "PD-1" OR "PD-L1" OR "CTLA-4" OR "CAR-T" OR neoantigen OR
                   macrophage OR MDSC OR Treg)'
    exemplar_dois: []
    audience_note: >
      PDAC immune landscape and immunotherapy — checkpoint blockade, cellular
      therapy, vaccines/neoantigens, myeloid/T-cell biology, immune evasion.

  - id: stroma_tme
    name: Tumor stroma / CAFs / desmoplasia & ECM/TME
    keywords: [stroma, CAF, cancer-associated fibroblast, desmoplasia, extracellular
               matrix, ECM, hyaluronan, collagen, myCAF, iCAF, apCAF, fibrosis,
               stellate cell, tumor microenvironment, TME]
    count_query: '(stroma OR CAF OR "cancer-associated fibroblast" OR desmoplasia OR
                   "extracellular matrix" OR hyaluronan OR collagen OR "stellate cell"
                   OR "tumor microenvironment")'
    exemplar_dois: []
    audience_note: >
      Stromal/desmoplastic biology — CAF subsets (myCAF/iCAF/apCAF), ECM
      (collagen/hyaluronan), pancreatic stellate cells, and stroma-directed approaches.

  - id: early_detection_biomarkers
    name: Early detection, biomarkers & liquid biopsy
    keywords: [early detection, biomarker, liquid biopsy, cfDNA, ctDNA, CA19-9,
               exosome, circulating tumor cell, CTC, screening, surveillance,
               high-risk, IPMN, PanIN, cyst]
    count_query: '("early detection" OR "liquid biopsy" OR cfDNA OR ctDNA OR
                   "CA19-9" OR "circulating tumor cell" OR IPMN OR PanIN)'
    exemplar_dois: []
    audience_note: >
      Detection/surveillance and biomarkers — liquid biopsy (cfDNA/ctDNA/CTC/
      exosomes), CA19-9, precursor lesions (IPMN/PanIN), and high-risk screening.

  - id: cachexia_resiliency
    name: Cancer cachexia & patient resiliency
    keywords: [cachexia, muscle wasting, sarcopenia, weight loss, anorexia, GDF15,
               body composition, nutrition, quality of life, frailty, resilience,
               supportive care, exercise, performance status]
    count_query: '(cachexia OR "muscle wasting" OR sarcopenia OR "weight loss" OR
                   anorexia OR GDF15 OR "quality of life" OR frailty OR
                   "supportive care" OR "body composition")'
    exemplar_dois: []
    audience_note: >
      Cachexia and patient resiliency — muscle wasting/sarcopenia, metabolic/
      inflammatory drivers (e.g. GDF15), body composition, nutrition, QoL, supportive care.

# Specific, high-signal terms tracked INDIVIDUALLY for keyword-level "movers"
# (drug names, mutations, named targets/genes). Generic terms are deliberately
# excluded — they just echo the topic. Each is counted per quarter (Europe PMC
# hitCount) by pipeline/backfill.py --keywords; analytics surfaces YoY movers.
tracked_keywords:
  myc: [MYC, MYCN, Omomyc]
  hur_elavl1: [HuR, ELAVL1]
  kras_ras_mapk: [G12D, G12C, sotorasib, adagrasib, MRTX1133, SHP2]
  ddr_repair: [BRCA2, PALB2, PARP, olaparib, ATR, WEE1]
  immunology_immunotherapy: ["PD-L1", "CTLA-4", "CAR-T", neoantigen, MDSC]
  stroma_tme: [myCAF, iCAF, hyaluronan, "stellate cell", desmoplasia]
  early_detection_biomarkers: ["CA19-9", cfDNA, ctDNA, exosome, IPMN]
  cachexia_resiliency: [cachexia, sarcopenia, GDF15, myosteatosis]
